[tool.poetry]
name = "henosync-plugin-sdk"
version = "0.1.0"
description = "Plugin SDK for Henosync robot mission planner"
authors = ["Henosync Team — Monash University"]
readme = "README.md"
license = "Apache-2.0"
package-mode = true
packages = [{ include = "henosync_sdk" }]

[tool.poetry.dependencies]
python = "^3.11"
pydantic = "^2.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"