<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", sans-serif;
      overflow: hidden;
    }

    .splash {
      width: 100%;
      height: 100%;
      background: #141619;
      border: 1px solid #2A2F38;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle glow effect */
    .splash::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(
        circle,
        rgba(74, 158, 255, 0.08) 0%,
        transparent 70%
      );
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      color: #E8EAED;
      letter-spacing: 2px;
    }

    .logo-text span {
      color: #4A9EFF;
    }

    .tagline {
      font-size: 12px;
      color: #8B95A3;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .loader {
      width: 160px;
      height: 2px;
      background: #252A31;
      border-radius: 1px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loader-bar {
      height: 100%;
      background: #4A9EFF;
      border-radius: 1px;
      animation: load 2s ease-in-out infinite;
    }

    @keyframes load {
      0%   { width: 0%;   margin-left: 0; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    .status {
      font-size: 11px;
      color: #8B95A3;
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 10px;
      color: #4A4F58;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18"
                stroke="#4A9EFF" stroke-width="1.5"
                stroke-dasharray="4 2" opacity="0.4"/>
        <circle cx="20" cy="20" r="12"
                stroke="#4A9EFF" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="4"
                fill="#4A9EFF"/>
        <line x1="20" y1="8"  x2="20" y2="4"
              stroke="#4A9EFF" stroke-width="1.5"
              stroke-linecap="round"/>
        <line x1="20" y1="32" x2="20" y2="36"
              stroke="#4A9EFF" stroke-width="1.5"
              stroke-linecap="round"/>
        <line x1="8"  y1="20" x2="4"  y2="20"
              stroke="#4A9EFF" stroke-width="1.5"
              stroke-linecap="round"/>
        <line x1="32" y1="20" x2="36" y2="20"
              stroke="#4A9EFF" stroke-width="1.5"
              stroke-linecap="round"/>
      </svg>
      <div class="logo-text">
        HENO<span>SYNC</span>
      </div>
    </div>
    <div class="tagline">Robot Fleet Mission Planner</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <div class="status">Starting backend...</div>
    <div class="version">v0.1.0</div>
  </div>
</body>
</html>
